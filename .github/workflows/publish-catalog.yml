name: Publish Catalog

on:
  workflow_dispatch:
  schedule:
    # 06:00 Europe/Istanbul == 03:00 UTC
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: publish-catalog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh curated models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/refresh_curated_models.py

      - name: Refresh embedding curated models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/refresh_embedding_curated_models.py

      - name: Refresh OCR curated models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/refresh_ocr_curated_models.py

      - name: Build catalog
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/build_catalog.py

      - name: Build embedding catalog
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/build_catalog.py --curated embedding_curated_models.yaml --output embedding_catalog.json

      - name: Build OCR catalog
        run: python scripts/build_ocr_catalog.py

      - name: Validate catalog
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/validate_catalog.py

      - name: Validate embedding catalog
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/validate_embedding_catalog.py

      - name: Validate OCR catalog
        run: python scripts/validate_ocr_catalog.py

      - name: Commit and push catalog
        run: |
          if git diff --quiet -- curated_models.yaml catalog.json embedding_curated_models.yaml embedding_catalog.json ocr_curated_models.yaml ocr_catalog.json; then
            echo "No catalog changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add curated_models.yaml catalog.json embedding_curated_models.yaml embedding_catalog.json ocr_curated_models.yaml ocr_catalog.json
          git commit -m "chore: refresh curated models and catalogs"
          git push
