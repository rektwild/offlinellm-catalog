name: Publish Catalog

on:
  workflow_dispatch:
  schedule:
    # 06:00 Europe/Istanbul == 03:00 UTC
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: publish-catalog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build catalog
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/build_catalog.py

      - name: Validate catalog
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/validate_catalog.py

      - name: Commit and push catalog
        run: |
          if git diff --quiet -- catalog.json; then
            echo "No catalog changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git commit -m "chore: update catalog"
          git push
